server {
    listen LISTEN_PORT;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve /friends/ledger and /friends/ledger/
    location = /friends/ledger {
        rewrite ^ /friends/ledger/ permanent;
    }

    location /friends/ledger/ {
        alias /usr/share/nginx/html/friends/ledger/;
        try_files $uri $uri/ /friends/ledger/index.html;
    }

    # Health check for Cloud Run
    location / {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
